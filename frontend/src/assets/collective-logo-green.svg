<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer circle background -->
  <circle cx="32" cy="32" r="30" fill="#16a34a"/>
  <circle cx="32" cy="32" r="30" fill="url(#grad)" opacity="0.9"/>

  <!-- Gradient definition -->
  <defs>
    <radialGradient id="grad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
  </defs>

  <!-- Chess piece (bishop/queen silhouette) in white -->
  <!-- Base -->
  <rect x="20" y="50" width="24" height="4" rx="2" fill="white" opacity="0.95"/>
  <!-- Stem -->
  <rect x="27" y="44" width="10" height="7" rx="1" fill="white" opacity="0.95"/>
  <!-- Body -->
  <ellipse cx="32" cy="37" rx="9" ry="7" fill="white" opacity="0.95"/>
  <!-- Neck -->
  <rect x="29" y="25" width="6" height="13" rx="2" fill="white" opacity="0.95"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="5" fill="white" opacity="0.95"/>
  <!-- Crown dot -->
  <circle cx="32" cy="16" r="2.5" fill="white" opacity="0.90"/>
  <!-- Left ear -->
  <circle cx="27" cy="19" r="1.8" fill="white" opacity="0.85"/>
  <!-- Right ear -->
  <circle cx="37" cy="19" r="1.8" fill="white" opacity="0.85"/>
</svg>
